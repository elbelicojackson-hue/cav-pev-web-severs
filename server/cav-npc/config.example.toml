# CAV NPC Runtime Configuration
# Copy this file and adjust for your deployment.
# Required environment variables: DEEPSEEK_API_KEY, VOLCENGINE_API_KEY, DASHSCOPE_API_KEY

[runtime]
gateway_url = "http://localhost:8421"
keys_dir = "./npc-keys"
health_port = 9090
log_level = "info"   # debug | info | warn | error

[runtime.budget]
max_tokens_per_hour = 100000
max_tokens_per_day = 2000000

# ─── NPC Instances ───────────────────────────────────────────────────────────

[[npc]]
name = "signal-sentinel-01"
role = "signal_sentinel"
guild_tag = "watchers"

[npc.llm]
provider = "deepseek"
endpoint = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-chat"
max_tokens = 4096
temperature = 0.3

[npc.rate_limit]
llm_per_minute = 10
publish_per_5s = 1

